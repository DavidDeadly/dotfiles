monitor = ,preferred,auto,auto
monitor = eDP-1,1920x1080@144,auto,1.25
monitor = HDMI-A-1,1920x1080@60,auto,1.25

workspace = name:Main, monitor:eDP-1, default:true
workspace = name:Web, monitor:HDMI-A-1, default:true, on-created-empty vivaldi

# Execute your favorite apps at launch
exec-once = copyq --start-server
exec-once = ~/.config/hypr/scripts/sleep.sh
exec-once =  /usr/lib/xfce-polkit/xfce-polkit
exec-once = swww init
# exec-once = waybar

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules = 

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    sensitivity = -0.5
}

windowrulev2 = opacity 0.9 0.8,class:^(vivaldi-stable)$

$mainMod = SUPER

# Keybinds
# Esencials
bind = $mainMod, Q, exec, kitty
bind = $mainMod, B, exec, vivaldi

# Utilities
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, exec, copyq toggle
bind = $mainMod, C, exec, hyprpicker | wl-copy
bind = $mainMod, SPACE, exec, wofi --show drun
bind = $mainMod, W, exec, ~/.config/hypr/scripts/swww_random.sh ~/Wallpapers

$edit_compress_copy = | swappy -f - -o - | pngquant - | wl-copy
# Screenshot area (and edit it) to clipboard
bind = , Print, exec, grim -g "$(slurp)" - $edit_compress_copy
# Screenshot main display (and edit it) to clipboard
bind = CONTROL, Print, exec, grim -o eDP-1 - $edit_compress_copy
# Screenshot secondary display (and edit it) to clipboard
bind = SHIFT, Print, exec, grim -o HDMI-A-1 - $edit_compress_copy

# System
bind = $mainMod SHIFT, L, exec, wlogout
bind = $mainMod SHIFT, X, killactive, 
bind = $mainMod SHIFT, M, exit, 

# Layouts
bind = $mainMod SHIFT, C, togglefloating, 
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, S, togglesplit, # dwindle
bind = $mainMod, F, fullscreen,
bind = $mainMod, T, toggleopaque,

# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + workspace
bind = $mainMod, 1, workspace, name:Main
bind = $mainMod, 2, workspace, name:Web
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# Move active window to a workspace with mainMod + SHIFT + workspace
bind = $mainMod SHIFT, 1, movetoworkspace, name:Main
bind = $mainMod SHIFT, 2, movetoworkspace, name:Web
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod SHIFT, K, workspace, e+1
bind = $mainMod SHIFT, J, workspace, e-1

# will switch to a submap resize
bind= $mainMod, R, submap, resize

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# will start a submap called "resize"
submap=resize
# sets repeatable binds for resizing the active window
binde = , L, resizeactive, 20 0
binde = , H, resizeactive, -20 0
binde = , K, resizeactive, 0 -20
binde = , J, resizeactive, 0 20
# use reset to go back to the global submap
bind= $mainMod, R, submap, reset 
# will reset the submap
submap=reset

# Enforce gpu's
env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2

# Screen sharing
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
